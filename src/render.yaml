services:
  - type: web
    name: forma-survey
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 3001
      - key: GEMINI_API_KEY
        sync: false   # set this manually in the Render dashboard
    disk:
      name: survey-data
      mountPath: /app/backend/data
      sizeGB: 1
