version: "3.9"

services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Persist survey data and media between restarts
      - ./backend/data:/app/backend/data
      - ./backend/uploads:/app/backend/uploads
      - ./backend/videos:/app/backend/videos
    restart: unless-stopped
